name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to create and release (e.g. v0.1.1). Leave empty to build only and upload as draft under current version.'
        required: false
        default: ''

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: rhop
  TARGET: x86_64-pc-windows-msvc

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Quality gate
        shell: pwsh
        run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features

      - name: Build release
        shell: pwsh
        run: cargo build --release --locked

      - name: Package artifacts
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          $src = "target/release/${{ env.BINARY_NAME }}.exe"
          if (-not (Test-Path $src)) { throw "Missing $src" }

          $tripleExe = "${{ env.BINARY_NAME }}-${{ env.TARGET }}.exe"
          Copy-Item $src "dist/$tripleExe"
          Copy-Item $src "dist/${{ env.BINARY_NAME }}.exe"
          Copy-Item install.ps1 dist/install.ps1
          Copy-Item uninstall.ps1 dist/uninstall.ps1

          $hashLines = @()
          Get-ChildItem dist -File | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            $hashLines += "$h  $($_.Name)"
            Write-Host "$($_.Name)  $h"
          }
          $hashLines | Set-Content -Path dist/SHA256SUMS.txt -Encoding utf8

          # Resolve version/tag for release naming
          $crateVersion = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } elseif ("${{ github.event.inputs.tag }}" -ne "") {
            $tag = "${{ github.event.inputs.tag }}"
            if (-not $tag.StartsWith("v")) { $tag = "v$tag" }
          } else {
            $tag = "v$crateVersion"
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "crate_version=$crateVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "asset=$tripleExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rhop-windows-x64
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.tag }}
          name: RepoHop ${{ steps.package.outputs.tag }}
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag == '' }}
          generate_release_notes: true
          files: |
            dist/rhop-x86_64-pc-windows-msvc.exe
            dist/rhop.exe
            dist/install.ps1
            dist/uninstall.ps1
            dist/SHA256SUMS.txt
          body: |
            ## Install (Windows PowerShell)

            ```powershell
            irm https://raw.githubusercontent.com/superdaobo/repohop/main/install.ps1 | iex
            ```

            Pin this release:

            ```powershell
            $env:REPOPHOP_VERSION = '${{ steps.package.outputs.tag }}'
            irm https://raw.githubusercontent.com/superdaobo/repohop/main/install.ps1 | iex
            ```

            ## Artifacts

            | File | Description |
            |------|-------------|
            | `rhop-x86_64-pc-windows-msvc.exe` | Primary Windows x64 binary |
            | `rhop.exe` | Same binary, short name |
            | `SHA256SUMS.txt` | Checksums |
            | `install.ps1` / `uninstall.ps1` | Installer scripts (also on `main`) |

            ## Verify

            ```powershell
            rhop version
            rhop doctor
            ```

            Uninstall:

            ```powershell
            irm https://raw.githubusercontent.com/superdaobo/repohop/main/uninstall.ps1 | iex
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
